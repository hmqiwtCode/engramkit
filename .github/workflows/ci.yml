name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip ruff
      - run: ruff check engramkit/ tests/
      - name: Plugin manifests match pyproject version
        run: python scripts/sync-version.py --check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # ── Future hardening: rebuild the bundled dashboard before
      # ── `python -m build` so the CI wheel matches exactly what ships to
      # ── PyPI via release.yml. Commented out for now to keep PR runs fast;
      # ── uncomment when we want CI to exercise the full release wheel
      # ── shape on every push.
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: npm
      #     cache-dependency-path: dashboard/package-lock.json
      # - run: npm ci
      #   working-directory: dashboard
      # - run: ./scripts/build-dashboard.sh
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check --strict dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npx next build
        working-directory: dashboard
      - name: Verify static export
        run: test -f dashboard/out/index.html
      # ── Future drift check: fail PRs that touch dashboard/ but didn't
      # ── commit the rebuilt `engramkit/dashboard_static/`. Currently
      # ── commented out — release.yml already rebuilds on tag, and we
      # ── don't want to surprise existing PRs. Uncomment once contributors
      # ── are routinely running `./scripts/build-dashboard.sh` before push.
      # - name: Verify bundled dashboard matches source
      #   run: |
      #     ./scripts/build-dashboard.sh
      #     if ! git diff --exit-status engramkit/dashboard_static/; then
      #       echo "::error::engramkit/dashboard_static/ is stale relative to dashboard/ source. Run ./scripts/build-dashboard.sh and commit the diff." >&2
      #       exit 1
      #     fi
