name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip ruff
      - run: ruff check engramkit/ tests/
      - name: Plugin manifests match pyproject version
        run: python scripts/sync-version.py --check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # The bundled dashboard is never committed — `engramkit/dashboard_static/`
      # is gitignored. CI is the single producer: rebuild from `dashboard/`
      # source on every run so the wheel always reflects current source. This
      # mirrors release.yml's own dashboard step so CI and release agree on
      # the exact wheel shape.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: ./scripts/build-dashboard.sh
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check --strict dist/*
      - name: Verify dashboard is bundled in the wheel
        run: |
          python - <<'PY'
          import zipfile, glob, sys
          (whl,) = glob.glob("dist/*.whl")
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          dashboard_files = [n for n in names if "dashboard_static/" in n]
          if not any(n.endswith("dashboard_static/index.html") for n in dashboard_files):
              sys.exit(f"Wheel {whl} is missing dashboard_static/index.html — bundle step regressed")
          print(f"OK: {len(dashboard_files)} dashboard files in {whl}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npx next build
        working-directory: dashboard
      - name: Verify static export
        run: test -f dashboard/out/index.html
      # No drift check needed: `engramkit/dashboard_static/` is gitignored
      # and produced fresh by the `build` job (and release.yml). Source-of-
      # truth is `dashboard/` only — there's nothing to drift from.
